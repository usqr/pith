name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint hooks (Node.js syntax check)
        run: |
          for f in hooks/*.js; do
            node --check "$f" && echo "  ✓ $f"
          done

      - name: Lint tools (Python syntax check)
        run: |
          for f in tools/*.py; do
            python3 -m py_compile "$f" && echo "  ✓ $f"
          done

      - name: Run token measurement tests
        run: python3 test/measure.py

      - name: Run simulator
        run: python3 test/simulator.py

      - name: Validate install.sh syntax
        run: bash -n install.sh && echo "  ✓ install.sh"

      - name: Validate uninstall.sh syntax
        run: bash -n uninstall.sh && echo "  ✓ uninstall.sh"

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json')); print('  ✓ plugin.json')"

      - name: Validate marketplace.json
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json')); print('  ✓ marketplace.json')"
